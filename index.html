        // Synonym expansion for ingredient matching
        const SYNONYMS = {
          'teriyaki': ['sójová omáčka', 'sojová omáčka'],
          'sójová omáčka': ['teriyaki', 'sojová omáčka'],
          'sojová omáčka': ['teriyaki', 'sójová omáčka'],
          'mrkev': ['mrkve', 'mrkví', 'mrkvička'],
          'mrkve': ['mrkev', 'mrkví'],
          'mrkví': ['mrkev', 'mrkve'],
          'brambory': ['brambor', 'bramborů', 'brambora'],
          'brambor': ['brambory', 'bramborů'],
          'rajčata': ['rajče', 'rajčat', 'rajčete'],
          'rajče': ['rajčata', 'rajčat'],
          'paprika': ['papriky', 'paprik'],
          'papriky': ['paprika', 'paprik'],
          'houby': ['houba', 'hub', 'žampiony'],
          'houba': ['houby', 'hub'],
          'česnek': ['česneku', 'česnekem'],
          'cibule': ['cibuli', 'cibuľ'],
          'kuřecí prsa': ['kuřecí', 'kuře', 'kuřecí maso'],
          'kuřecí': ['kuřecí prsa', 'kuře'],
          'vepřové maso': ['vepřové', 'vepřová'],
          'vepřové': ['vepřové maso', 'vepřová'],
          'hovězí maso': ['hovězí', 'hovězího'],
          'hovězí': ['hovězí maso', 'hovězího']
        };

        function cleanIngredient(ing) {
          let cleaned = ing.toLowerCase().trim();
          // Remove quantity prefixes
          cleaned = cleaned.replace(/^\d+\s*(g|kg|ml|l|ks|lžíce|lžička)?\s*/i, '');
          // Remove adjectives and parentheticals
          cleaned = cleaned.replace(/\s*(čerstvého|čerstvé|nakrájené|nakrájeného|strouhaného|strouhané)\s*/gi, '');
          cleaned = cleaned.replace(/\s*\([^)]*\)/g, '');
          return cleaned.trim();
        }

        function expandWithSynonyms(ingredient) {
          const cleaned = cleanIngredient(ingredient);
          const result = [cleaned];
          if (SYNONYMS[cleaned]) {
            result.push(...SYNONYMS[cleaned]);
          }
          return result;
        }

        function matchRecipes(availableIngredients) {
          const expanded = availableIngredients.flatMap(ing => expandWithSynonyms(ing));
          const allAvailable = [...new Set([...expanded, ...BASE_PANTRY])];
          
          return RECIPES_DATA.map(recipe => {
            const matchedIngredients = recipe.ingredients.filter(ing => 
              allAvailable.some(available => {
                const cleanAvailable = cleanIngredient(available);
                const cleanRecipe = cleanIngredient(ing);
                return cleanAvailable === cleanRecipe || 
                       cleanAvailable.includes(cleanRecipe) || 
                       cleanRecipe.includes(cleanAvailable);
              })
            );
            const matchPercent = (matchedIngredients.length / recipe.ingredients.length) * 100;
            return { ...recipe, matchPercent, matchedIngredients };
          }).filter(r => r.matchPercent >= 65).sort((a, b) => b.matchPercent - a.matchPercent);
        }

        function CookCleverApp() {

            return saved ? JSON.parse(saved) : {};
          });
          const [fridgeIngredients, setFridgeIngredients] = useState('');
          const [fridgeResults, setFridgeResults] = useState([]);
          const [selectedRecipe, setSelectedRecipe] = useState(null);
          const [showPlanPicker, setShowPlanPicker] = useState(false);
          const [recipeToSchedule, setRecipeToSchedule] = useState(null);

          useEffect(() => {
            localStorage.setItem('weekPlan', JSON.stringify(weekPlan));
          }, [weekPlan]);

          const categories = ['Vše', 'Kuřecí', 'Vepřové', 'Hovězí', 'Ryby', 'Vegan', 'Dezerty', 'Vlastní'];

          const filteredRecipes = RECIPES_DATA.filter(r => {
            const matchesSearch = r.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
              r.ingredients.some(ing => ing.toLowerCase().includes(searchTerm.toLowerCase()));
            const matchesCategory = selectedCategory === 'Vše' || r.category === selectedCategory;
            return matchesSearch && matchesCategory;
          });

          const handleFridgeScan = () => {
            const ingredients = fridgeIngredients.split(',').map(s => s.trim()).filter(Boolean);
            const results = matchRecipes(ingredients);
            setFridgeResults(results);
          };

          const addToPlan = (day, meal, recipe) => {
            setWeekPlan(prev => ({
              ...prev,
              [day]: { ...prev[day], [meal]: recipe }
            }));
            setShowPlanPicker(false);
            setRecipeToSchedule(null);
          };

          const removeFromPlan = (day, meal) => {
            setWeekPlan(prev => {
              const newPlan = { ...prev };
              if (newPlan[day]) {
                delete newPlan[day][meal];
                if (Object.keys(newPlan[day]).length === 0) delete newPlan[day];
              }
              return newPlan;
            });
          };

          const openRecipeWithPlanPicker = (recipe) => {
            setSelectedRecipe(recipe);
            setRecipeToSchedule(recipe);
            setShowPlanPicker(true);
          };

          const days = ['Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota', 'Neděle'];
          const meals = ['Oběd', 'Večeře'];

          return (
            <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', paddingBottom: '80px' }}>

                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    style={{
                      flex: 1,
                      padding: '15px',
                      border: 'none',
                      background: activeTab === tab.id ? '#667eea' : 'transparent',
                      color: activeTab === tab.id ? 'white' : '#4a5568',
                      fontSize: '16px',
                      fontWeight: '600',
                      cursor: 'pointer',
                      transition: 'all 0.3s'
                    }}
                  >
                    {tab.icon} {tab.label.split(' ')[1]}
                  </button>
                ))}
              </div>

              {/* Content */}
              <div style={{ padding: '20px' }}>
                {activeTab === 'plan' && (
                  <div>
                    <h2 style={{ color: 'white', marginBottom: '20px', fontSize: '22px' }}>Týdenní jídelníček</h2>

                      <div key={day} style={{ background: 'rgba(255,255,255,0.95)', borderRadius: '12px', padding: '15px', marginBottom: '15px' }}>
                        <h3 style={{ fontSize: '18px', color: '#2d3748', marginBottom: '10px' }}>{day}</h3>
                        <div style={{ display: 'grid', gap: '10px' }}>
                          {meals.map(meal => (
                            <div key={meal} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px', background: '#f7fafc', borderRadius: '8px' }}>
                              <div style={{ flex: 1 }}>
                                <strong style={{ color: '#4a5568', fontSize: '14px' }}>{meal}:</strong>
                                {weekPlan[day]?.[meal] ? (
                                  <div style={{ marginTop: '5px' }}>
                                    <span 
                                      onClick={() => setSelectedRecipe(weekPlan[day][meal])}
                                      style={{ color: '#667eea', cursor: 'pointer', textDecoration: 'underline', fontSize: '14px' }}

                                    </span>
                                  </div>
                                ) : (
                                  <span style={{ color: '#a0aec0', fontSize: '14px' }}> Ještě neplánováno</span>
                                )}
                              </div>
                              {weekPlan[day]?.[meal] && (
                                <button
                                  onClick={() => removeFromPlan(day, meal)}
                                  style={{ padding: '5px 10px', background: '#fc8181', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '12px' }}
                                >
                                  ✕
                                </button>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === 'recipes' && (
                  <div>
                    <input
                      type="text"
                      placeholder="Hledat recept nebo ingredienci..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      style={{ width: '100%', padding: '15px', borderRadius: '12px', border: '2px solid #e2e8f0', fontSize: '16px', marginBottom: '15px' }}
                    />
                    <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '20px' }}>

                    {fridgeResults.length > 0 && (

                            <div
                              key={recipe.id}
                              onClick={() => openRecipeWithPlanPicker(recipe)}
                              style={{
                                background: 'rgba(255,255,255,0.95)',
                                padding: '15px',
                                borderRadius: '12px',
                                cursor: 'pointer'
                              }}
                            >
                              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                                <span style={{ fontSize: '28px' }}>{recipe.photo}</span>
                                <span style={{ background: '#48bb78', color: 'white', padding: '4px 12px', borderRadius: '12px', fontSize: '12px', fontWeight: '600' }}>
                                  {Math.round(recipe.matchPercent)}% shoda
                                </span>
                              </div>
                              <h3 style={{ fontSize: '16px', color: '#2d3748', marginBottom: '8px' }}>{recipe.name}</h3>
                              <p style={{ fontSize: '12px', color: '#48bb78', marginBottom: '4px' }}>
                                ✓ Máš: {recipe.matchedIngredients.join(', ')}
                              </p>
                              <p style={{ fontSize: '12px', color: '#fc8181' }}>
                                ✗ Chybí: {recipe.ingredients.filter(ing => !recipe.matchedIngredients.includes(ing)).join(', ')}
                              </p>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Recipe Detail Modal */}
              {selectedRecipe && !showPlanPicker && (
                <div onClick={() => setSelectedRecipe(null)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', zIndex: 1000 }}>
                  <div onClick={(e) => e.stopPropagation()} style={{ background: 'white', borderRadius: '16px', padding: '25px', maxWidth: '500px', width: '100%', maxHeight: '80vh', overflow: 'auto' }}>
                    <div style={{ textAlign: 'center', marginBottom: '20px' }}>
                      <div style={{ fontSize: '64px', marginBottom: '10px' }}>{selectedRecipe.photo}</div>
                      <h2 style={{ fontSize: '22px', color: '#2d3748', marginBottom: '5px' }}>{selectedRecipe.name}</h2>
                      <span style={{ color: '#718096', fontSize: '14px' }}>{selectedRecipe.category}</span>
                    </div>
                    <div style={{ marginBottom: '20px' }}>
                      <h3 style={{ fontSize: '16px', color: '#2d3748', marginBottom: '10px' }}>Ingredience:</h3>
                      <ul style={{ paddingLeft: '20px', color: '#4a5568' }}>
                        {selectedRecipe.ingredients.map((ing, idx) => (
                          <li key={idx} style={{ marginBottom: '5px', fontSize: '14px' }}>{ing}</li>
                        ))}
                      </ul>
                    </div>
                    <div style={{ display: 'flex', gap: '10px' }}>
                      <button
                        onClick={() => openRecipeWithPlanPicker(selectedRecipe)}
                        style={{ flex: 1, padding: '12px', background: '#667eea', color: 'white', border: 'none', borderRadius: '10px', fontSize: '16px', fontWeight: '600', cursor: 'pointer' }}
                      >
                        📅 Přidat do plánu
                      </button>
                      <button
                        onClick={() => setSelectedRecipe(null)}
                        style={{ flex: 1, padding: '12px', background: '#e2e8f0', color: '#4a5568', border: 'none', borderRadius: '10px', fontSize: '16px', fontWeight: '600', cursor: 'pointer' }}
                      >
                        Zavřít
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Plan Picker Modal */}
              {showPlanPicker && recipeToSchedule && (
                <div onClick={() => { setShowPlanPicker(false); setRecipeToSchedule(null); }} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '20px', zIndex: 1001 }}>
                  <div onClick={(e) => e.stopPropagation()} style={{ background: 'white', borderRadius: '16px', padding: '25px', maxWidth: '500px', width: '100%', maxHeight: '80vh', overflow: 'auto' }}>
                    <h2 style={{ fontSize: '20px', color: '#2d3748', marginBottom: '15px', textAlign: 'center' }}>
                      Kam naplánovat: {recipeToSchedule.photo} {recipeToSchedule.name}?
                    </h2>
                    {days.map(day => (
                      <div key={day} style={{ marginBottom: '15px' }}>
                        <h3 style={{ fontSize: '16px', color: '#4a5568', marginBottom: '8px' }}>{day}</h3>
                        <div style={{ display: 'flex', gap: '10px' }}>
                          {meals.map(meal => (
                            <button
                              key={meal}
                              onClick={() => addToPlan(day, meal, recipeToSchedule)}
                              style={{
                                flex: 1,
                                padding: '12px',
                                background: weekPlan[day]?.[meal] ? '#fc8181' : '#48bb78',
                                color: 'white',
                                border: 'none',
                                borderRadius: '10px',
                                fontSize: '14px',
                                fontWeight: '600',
                                cursor: 'pointer'
                              }}
                            >
                              {meal} {weekPlan[day]?.[meal] ? '(nahradit)' : ''}
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                    <button
                      onClick={() => { setShowPlanPicker(false); setRecipeToSchedule(null); }}
                      style={{ width: '100%', padding: '12px', background: '#e2e8f0', color: '#4a5568', border: 'none', borderRadius: '10px', fontSize: '16px', fontWeight: '600', cursor: 'pointer', marginTop: '10px' }}
                    >
                      Zrušit
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        ReactDOM.render(<CookCleverApp />, document.getElementById('root'));
    </script>
</body>
</html>
