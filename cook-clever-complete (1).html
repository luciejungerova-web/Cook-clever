    ];

    // State
    let state = {
      currentTab: 'plan',
      plan: {},
      shopping: [],
      pantry: {},
      fridgeIngredients: [],
      fridgeResults: null,
      filterTag: 'Vše'
    };

    // LocalStorage
    function loadState() {
      try {
        const saved = localStorage.getItem('cook-clever-state');
        if (saved) {
          state = { ...state, ...JSON.parse(saved) };
        }
        if (!state.plan || Object.keys(state.plan).length === 0) {
          state.plan = {};
          DAYS.forEach(d => state.plan[d] = { Oběd: null, Večeře: null });
        }
        if (!state.pantry || Object.keys(state.pantry).length === 0) {
          state.pantry = {};
          PANTRY_STAPLES.forEach(s => state.pantry[s.toLowerCase()] = true);
        }
        state.shopping = state.shopping || [];
      } catch (e) {
        console.error('Load error:', e);
      }
    }

    function saveState() {
      try {
        localStorage.setItem('cook-clever-state', JSON.stringify(state));
      } catch (e) {
        console.error('Save error:', e);
      }
    }

    // UI Functions
    function showToast(msg, color = '#22c55e') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = color;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function updateStats() {
      const total = DAYS.length * MEAL_TYPES.length;
      const planned = Object.values(state.plan).reduce((a, d) => 
        a + Object.values(d).filter(v => v).length, 0);
      const progress = Math.round((planned / total) * 100);
      document.getElementById('statValue').textContent = progress + '%';
      document.getElementById('statFill').style.width = progress + '%';
    }

    function updateHeader() {
      const today = new Date();
      const dateStr = today.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long' });
      document.getElementById('headerDate').textContent = `${dateStr} · ${RECIPES.length} receptů`;
    }

    function switchTab(tab) {
      state.currentTab = tab;
      
      // Hide all views
      document.querySelectorAll('#planView, #libraryView, #shoppingView, #pantryView').forEach(el => {
        el.classList.add('hidden');
      });
      
      // Show current view
      document.getElementById(tab + 'View').classList.remove('hidden');
      
      // Update nav
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      
      // Render current view
      if (tab === 'plan') renderPlan();
      else if (tab === 'library') renderLibrary();
      else if (tab === 'shopping') renderShopping();
      else if (tab === 'pantry') renderPantry();
    }

    function renderPlan() {
      const container = document.getElementById('planDays');
      const today = new Date();
      const todayIdx = today.getDay() === 0 ? 6 : today.getDay() - 1;
      
      const planned = Object.values(state.plan).reduce((a, d) => 
        a + Object.values(d).filter(v => v).length, 0);
      
      document.getElementById('generateBtn').style.display = planned > 0 ? 'flex' : 'none';
      
      container.innerHTML = DAYS.map((day, di) => {
        const isToday = di === todayIdx;
        const isShopping = SHOPPING_DAYS.includes(di);
        
        return `
          <div class="day-card ${isToday ? 'today' : ''}">
            <div class="day-header">
              <span class="day-name">${day}</span>
              <div style="display: flex; gap: 4px; align-items: center;">
                ${isToday ? '<span style="font-size: 8px; background: #6366f1; color: #fff; padding: 2px 6px; border-radius: 20px; font-weight: 700;">dnes</span>' : ''}
                ${isShopping ? '<span style="font-size: 12px;">🛒</span>' : ''}
              </div>
            </div>
            ${MEAL_TYPES.map(meal => {
              const r = state.plan[day][meal];
              return `
                <div class="meal-slot">
                  <div class="meal-label">${meal}</div>
                  ${r ? `
                    <div class="slot filled" onclick="showRecipeDetail(${r.id})">
                      <div class="slot-content">
                        <div class="slot-emoji">${r.emoji}</div>
                        <div class="slot-name">${r.name}</div>
                      </div>
                      <button onclick="event.stopPropagation(); clearSlot('${day}', '${meal}')" 
                        style="position: absolute; top: 4px; right: 4px; background: none; border: none; color: #cbd5e1; font-size: 18px; cursor: pointer; width: 24px; height: 24px;">×</button>
                    </div>
                  ` : `
                    <div class="slot" onclick="switchTab('library')">
                      <span style="font-size: 11px; color: #94a3b8; font-weight: 600;">+ přidat</span>
                    </div>
                  `}
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    function renderLibrary() {
      const tags = ['Vše', ...Object.keys(TAG_STYLES)];
      document.getElementById('filterChips').innerHTML = tags.map(t => 
        `<button class="filter-chip ${state.filterTag === t ? 'active' : ''}" onclick="setFilter('${t}')">${t}</button>`
      ).join('');
      
      const filtered = RECIPES.filter(r => state.filterTag === 'Vše' || r.tag === state.filterTag);
      document.getElementById('recipeCount').textContent = `${filtered.length} z ${RECIPES.length} receptů`;
      
      document.getElementById('recipeGrid').innerHTML = filtered.map(r => {
        const ts = TAG_STYLES[r.tag] || TAG_STYLES["Kuřecí"];
        return `
          <div class="recipe-card" onclick="showRecipeDetail(${r.id})">
            <div class="recipe-card-top" style="background: linear-gradient(90deg, ${ts.from}, ${ts.to})"></div>
            <div class="recipe-card-body">
              <div class="recipe-emoji">${r.emoji}</div>
              <div class="recipe-name">${r.name}</div>
              <div class="recipe-meta">
                <span class="tag" style="background: linear-gradient(135deg, ${ts.from}, ${ts.to})">${r.tag}</span>
                <span style="font-size: 10px; background: #f1f5f9; color: #64748b; padding: 2px 8px; border-radius: 8px; font-weight: 600;">⏱ ${r.time}</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderShopping() {
      const today = new Date();
      const todayIdx = today.getDay() === 0 ? 6 : today.getDay() - 1;
      const nextDay = FULL_DAYS[SHOPPING_DAYS.find(d => d >= todayIdx) ?? SHOPPING_DAYS[0]];
      document.getElementById('nextShoppingDay').textContent = nextDay;
      
      const pending = state.shopping.filter(i => !i.checked).length;
      document.getElementById('pendingCount').textContent = pending;
      
      const unchecked = state.shopping.filter(i => !i.checked);
      const checked = state.shopping.filter(i => i.checked);
      
      let html = '';
      if (state.shopping.length === 0) {
        html = '<div class="empty"><div style="font-size: 48px; margin-bottom: 12px;">🛒</div><div style="font-size: 14px; font-weight: 600; color: #64748b;">Seznam je prázdný</div></div>';
      } else {
        if (unchecked.length > 0) {
          html += '<div style="font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; margin: 12px 0 8px;">K NÁKUPU (' + unchecked.length + ')</div>';
          html += unchecked.map(item => `
            <div class="shopping-item">
              <input type="checkbox" class="checkbox" onchange="toggleShoppingItem(${item.id})">
              <span class="item-text">${item.name}</span>
              <button class="item-delete" onclick="removeShoppingItem(${item.id})">×</button>
            </div>
          `).join('');
        }
        if (checked.length > 0) {
          html += '<div style="font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #94a3b8; margin: 16px 0 8px;">HOTOVO (' + checked.length + ')</div>';
          html += checked.map(item => `
            <div class="shopping-item checked">
              <input type="checkbox" class="checkbox" checked onchange="toggleShoppingItem(${item.id})">
              <span class="item-text">${item.name}</span>
              <button class="item-delete" onclick="removeShoppingItem(${item.id})">×</button>
            </div>
          `).join('');
        }
      }
      
      document.getElementById('shoppingList').innerHTML = html;
    }

    function renderPantry() {
      let html = '';
      PANTRY_GROUPS.forEach(group => {
        html += `<div style="margin-bottom: 12px;">`;
        html += `<div style="font-size: 10px; font-weight: 700; color: #94a3b8; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px;">${group.label}</div>`;
        html += `<div style="display: flex; flex-wrap: wrap; gap: 5px;">`;
        group.items.forEach(item => {
          const key = item.toLowerCase();
          const inStock = state.pantry[key] !== false;
          html += `
            <button onclick="togglePantry('${key}')" 
              style="border: none; cursor: pointer; font-size: 11px; font-weight: 700; padding: 5px 11px; border-radius: 20px; transition: all 0.15s; font-family: inherit;
              background: ${inStock ? '#f1f5f9' : '#fef2f2'};
              color: ${inStock ? '#64748b' : '#ef4444'};
              outline: ${inStock ? '1px solid transparent' : '1px solid #fecaca'};">
              ${inStock ? '✅' : '❌'} ${item}
            </button>
          `;
        });
        html += `</div></div>`;
      });
      document.getElementById('pantryItems').innerHTML = html;
      
      // Render fridge results if exist
      renderFridge();
    }

    function renderFridge() {
      if (!state.fridgeResults) {
        document.getElementById('fridgeResults').innerHTML = `
          <div class="empty">
            <div style="font-size: 36px; margin-bottom: 8px;">🥦🧀🥕</div>
            <div style="font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 4px;">Zadej suroviny které máš doma</div>
            <div style="font-size: 11px; color: #94a3b8; line-height: 1.6;">Základní suroviny (sůl, pepř, olej...)<br/>se počítají automaticky.</div>
          </div>
        `;
        return;
      }

      const { ingredients, matches } = state.fridgeResults;
      
      let html = `
        <div class="card">
          <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; margin-bottom: 10px;">
            🛒 Rozpoznané suroviny (${ingredients.length})
          </div>
          <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;">
            ${ingredients.map(ing => `
              <span style="background: linear-gradient(135deg,#f0f9ff,#e0f2fe); border: 1px solid #bae6fd; color: #0369a1; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px;">
                ${ing}
              </span>
            `).join('')}
          </div>
          <div style="font-size: 11px; color: #94a3b8;">
            + základní suroviny: sůl, pepř, olej, cibule, česnek...
          </div>
        </div>
      `;

      if (matches.length === 0) {
        html += `
          <div class="empty">
            <div style="font-size: 36px; margin-bottom: 8px;">😕</div>
            <div style="font-size: 14px; font-weight: 600; color: #64748b;">Nenašly se recepty s 65%+ surovin</div>
          </div>
        `;
      } else {
        html += `<div style="font-size: 13px; font-weight: 700; margin: 12px 0 10px;">✅ ${matches.length} receptů které teď uvařím:</div>`;
        html += '<div class="recipe-grid">';
        html += matches.map(({recipe: r, score, missing}) => {
          const ts = TAG_STYLES[r.tag] || TAG_STYLES["Kuřecí"];
          const pct = Math.round(score * 100);
          return `
            <div class="recipe-card" onclick="showRecipeDetail(${r.id})">
              <div class="recipe-card-top" style="background: linear-gradient(90deg, ${ts.from}, ${ts.to})"></div>
              <div class="recipe-card-body">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;">
                  <div class="recipe-emoji">${r.emoji}</div>
                  <span class="match-badge ${pct === 100 ? 'high' : 'med'}">${pct}% ✓</span>
                </div>
                <div class="recipe-name">${r.name}</div>
                ${missing.length > 0 ? `
                  <div style="background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 6px 8px; margin-top: 8px;">
                    <div style="font-size: 9px; font-weight: 700; color: #c2410c; margin-bottom: 2px;">Chybí (${missing.length}):</div>
                    <div style="font-size: 10px; color: #9a3412;">${missing.slice(0, 2).join(', ')}${missing.length > 2 ? ` +${missing.length - 2}` : ''}</div>
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        }).join('');
        html += '</div>';
      }

      document.getElementById('fridgeResults').innerHTML = html;
    }

    function searchFridge() {
      const input = document.getElementById('fridgeInput');
      const text = input.value.trim();
      if (!text) return;

      const ingredients = text.split(/[,;]+/).map(s => s.trim().toLowerCase()).filter(Boolean);
      const matches = matchRecipes(ingredients);
      
      state.fridgeResults = { ingredients, matches };
      renderFridge();
      showToast(matches.length > 0 ? `Našla jsem ${matches.length} receptů! 🎉` : 'Žádný recept 65%+ 😕', matches.length > 0 ? '#22c55e' : '#f59e0b');
    }

    // Recipe matching
    function matchRecipes(detectedIngredients) {
      const allAvailable = [...detectedIngredients.map(i => i.toLowerCase()), ...BASE_PANTRY];
      const getStem = (w) => { w = w.trim().toLowerCase(); return w.length > 5 ? w.slice(0, Math.max(4, Math.floor(w.length * 0.6))) : w; };
      const isMatch = (req, av) => {
        if (req === av || req.includes(av) || av.includes(req)) return true;
        const rs = getStem(req), as = getStem(av);
        return rs === as || (rs.length >= 4 && av.includes(rs)) || (as.length >= 4 && req.includes(as));
      };
      const cleanIng = (ing) => ing.toLowerCase()
        .replace(/\([^)]*\)/g, "")
        .replace(/^[\d\s,.×x–\-]+(bal\.|balení|lžíc[ei]|lžičk[yu]|stroužk[yů]|kus[ů]?|g|kg|ml|dl|cl|l|ks|hrst|svazek)\s*/i, "")
        .replace(/^[\d.,\s]+/, "")
        .replace(/\b(čerstvého|čerstvé|nakrájené|polotučného|celozrnné|bílého|červeného|zelené|sušené|kvalitní|strouhaného)\b/gi, "")
        .replace(/\s+/g, " ").trim();

      return RECIPES.map(recipe => {
        const required = recipe.ingredients.map(cleanIng).filter(r => r.length > 1);
        const matched = required.filter(req => allAvailable.some(av => isMatch(req, av)));
        const missing = required.filter(req => !allAvailable.some(av => isMatch(req, av)));
        const score = required.length > 0 ? matched.length / required.length : 0;
        return { recipe, score, missing, matched: matched.length, total: required.length };
      }).filter(m => m.score >= 0.65).sort((a, b) => b.score - a.score);
    }

    // Actions
    function setFilter(tag) {
      state.filterTag = tag;
      renderLibrary();
    }

    function clearSlot(day, meal) {
      state.plan[day][meal] = null;
      saveState();
      updateStats();
      renderPlan();
      showToast('Odebráno z plánu');
    }

    function toggleShoppingItem(id) {
      const item = state.shopping.find(i => i.id === id);
      if (item) {
        item.checked = !item.checked;
        saveState();
        renderShopping();
      }
    }

    function removeShoppingItem(id) {
      state.shopping = state.shopping.filter(i => i.id !== id);
      saveState();
      renderShopping();
    }

    function addCustomShoppingItem() {
      const input = document.getElementById('customShopInput');
      const text = input.value.trim();
      if (!text) return;
      
      state.shopping.push({ name: text, checked: false, id: Date.now() });
      saveState();
      input.value = '';
      renderShopping();
      showToast('Přidáno do nákupu 🛒');
    }

    function togglePantry(key) {
      const wasInStock = state.pantry[key] !== false; // default je true
      const newInStock = !wasInStock;
      state.pantry[key] = newInStock;
      saveState();
      renderPantry();
      
      const item = PANTRY_STAPLES.find(s => s.toLowerCase() === key);
      
      if (!newInStock) {
        // Došlo — přidej do nákupního seznamu pokud tam ještě není
        const alreadyIn = state.shopping.some(s => s.name.toLowerCase() === key || s.name.toLowerCase().includes(key));
        if (!alreadyIn) {
          const newItem = { name: item, checked: false, id: Date.now() + Math.random(), fromPantry: true };
          state.shopping.push(newItem);
          saveState();
          renderShopping();
          showToast(`${item} přidáno do nákupu 🛒`, '#f59e0b');
        } else {
          showToast(`${item}: Došlo ❌`, '#f59e0b');
        }
      } else {
        // Zpět skladem — odstraň z nákupního seznamu pokud tam je (jen pokud přidáno z pantry)
        const originalLength = state.shopping.length;
        state.shopping = state.shopping.filter(s => !(s.fromPantry && s.name.toLowerCase() === key));
        if (state.shopping.length !== originalLength) {
          saveState();
          renderShopping();
        }
        showToast(`${item}: Skladem ✅`, '#22c55e');
      }
    }

    function generateShopping() {
      const seen = new Map();
      
      // Gather all ingredients from meal plan
      Object.values(state.plan).forEach(day => {
        Object.values(day).forEach(r => {
          if (r) {
            r.ingredients.forEach(ing => {
              const key = ing.toLowerCase().trim();
              
              // Check if item is in pantry (skladem)
              const isInPantry = PANTRY_STAPLES.some(staple => {
                const stapleKey = staple.toLowerCase();
                return state.pantry[stapleKey] !== false && 
                       (key.includes(stapleKey) || stapleKey.includes(key) || 
                        key === stapleKey);
              });
              
              // Only add if NOT in pantry
              if (!isInPantry && !seen.has(key)) {
                seen.set(key, { name: ing, checked: false, id: Date.now() + Math.random() });
              }
            });
          }
        });
      });
      
      state.shopping = [...seen.values()];
      saveState();
      switchTab('shopping');
      showToast(`Nákup vygenerován — ${state.shopping.length} položek 🛒`);
    }

    function shareShoppingList() {
      // Sestav kompletní seznam: položky ze seznamu (nezaškrtnuté) + chybějící zásoby (❌)
      const fromList = state.shopping.filter(i => !i.checked);

      // Přidej zásoby označené jako ❌ které ještě nejsou v seznamu
      const missingPantry = PANTRY_STAPLES.filter(item => {
        const key = item.toLowerCase();
        const inStock = state.pantry[key] !== false;
        if (inStock) return false; // má doma
        const alreadyIn = state.shopping.some(s => s.name.toLowerCase() === key || s.name.toLowerCase().includes(key));
        return !alreadyIn;
      });

      const allItems = [...fromList, ...missingPantry.map(item => ({ name: item, fromPantry: true }))];
      if (!allItems.length) { showToast("Seznam je prázdný 🤷","#f59e0b"); return; }

      // Rozděl na sekce
      const pantryItems = allItems.filter(i => i.fromPantry);
      const recipeItems = allItems.filter(i => !i.fromPantry);

      // Create formatted text
      let text = '🍳 COOK CLEVER\n';
      text += '━━━━━━━━━━━━━━━━━━━━\n\n';
      
      // Add meal plan
      text += '📅 JÍDELNÍČEK NA TÝDEN\n\n';
      DAYS.forEach((day, di) => {
        const dayPlan = state.plan[day];
        const hasFood = dayPlan.Oběd || dayPlan.Večeře;
        if (hasFood) {
          text += `${day.toUpperCase()}\n`;
          if (dayPlan.Oběd) text += `  🍽 Oběd: ${dayPlan.Oběd.name}\n`;
          if (dayPlan.Večeře) text += `  🌙 Večeře: ${dayPlan.Večeře.name}\n`;
          text += '\n';
        }
      });
      
      // Add shopping list
      text += '━━━━━━━━━━━━━━━━━━━━\n\n';
      text += '🛒 NÁKUPNÍ SEZNAM\n\n';
      
      if (recipeItems.length > 0) {
        text += `🍽 Z JÍDELNÍHO PLÁNU (${recipeItems.length} položek):\n`;
        recipeItems.forEach((item, i) => {
          text += `  ${i + 1}. ${item.name}\n`;
        });
        text += '\n';
      }
      
      if (pantryItems.length > 0) {
        text += `🏠 CHYBĚJÍCÍ ZÁSOBY (${pantryItems.length} položek):\n`;
        pantryItems.forEach((item, i) => {
          text += `  ${i + 1}. ${item.name}\n`;
        });
        text += '\n';
      }
      
      text += '━━━━━━━━━━━━━━━━━━━━\n';
      text += 'Vytvořeno v Cook Clever 🍳';
      
      // Try native share
      if (navigator.share) {
        navigator.share({
          title: 'Cook Clever - Jídelníček a nákup',
          text: text
        }).catch(err => {
          // Fallback - copy to clipboard
          copyToClipboard(text);
        });
      } else {
        // Fallback - copy to clipboard
        copyToClipboard(text);
      }
    }

    function copyToClipboard(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          showToast('Zkopírováno do schránky 📋', '#6366f1');
        }).catch(() => {
          // Final fallback
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showToast('Zkopírováno do schránky 📋', '#6366f1');
      } catch (err) {
        showToast('Nepodařilo se zkopírovat', '#ef4444');
      }
      document.body.removeChild(textarea);
    }

    function showRecipeDetail(id) {
      const r = RECIPES.find(recipe => recipe.id === id);
      if (!r) return;
      
      const ts = TAG_STYLES[r.tag] || TAG_STYLES["Kuřecí"];
      const modalContent = `
        <div style="height: 5px; background: linear-gradient(90deg, ${ts.from}, ${ts.to}); border-radius: 4px; margin: -20px -20px 16px;"></div>
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
          <div style="display: flex; gap: 12px; align-items: center;">
            <span style="font-size: 36px;">${r.emoji}</span>
            <div>
              <div style="font-size: 18px; font-weight: 800;">${r.name}</div>
              <div style="font-size: 11px; color: #94a3b8; margin-top: 4px;">${r.tag} · ⏱ ${r.time}</div>
            </div>
          </div>
          <button onclick="closeModal()" style="background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px;">✕</button>
        </div>
        
        <div style="font-size: 13px; font-weight: 800; margin-bottom: 12px;">🧺 Ingredience</div>
        ${r.ingredients.map(ing => `
          <div style="font-size: 13px; color: #374151; margin-bottom: 6px; display: flex; gap: 8px;">
            <span style="color: #6366f1; font-weight: 700;">·</span>${ing}
          </div>
        `).join('')}
        
        ${r.steps ? `
          <div style="font-size: 13px; font-weight: 800; margin: 16px 0 12px;">📋 Postup</div>
          ${r.steps.map((step, i) => `
            <div style="display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start;">
              <div style="width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                ${i + 1}
              </div>
              <p style="font-size: 13px; color: #374151; line-height: 1.6; flex: 1;">${step}</p>
            </div>
          `).join('')}
        ` : ''}
        
        <div style="margin-top: 20px; font-size: 12px; font-weight: 700; color: #6366f1; margin-bottom: 12px;">
          📅 Přidat do plánu:
        </div>
        <div style="display: grid; gap: 6px;">
          ${DAYS.map((d, di) => MEAL_TYPES.map(meal => {
            const already = state.plan[d][meal]?.id === r.id;
            const occupied = state.plan[d][meal] && !already;
            return `
              <button onclick="${already ? '' : `addToPlan(${r.id}, '${d}', '${meal}')`}"
                style="width: 100%; padding: 10px 12px; border-radius: 10px; border: none; cursor: ${already ? 'default' : 'pointer'};
                font-family: inherit; font-size: 12px; font-weight: 700; text-align: left;
                background: ${already ? '#dcfce7' : occupied ? '#f1f5f9' : '#fff'};
                color: ${already ? '#16a34a' : occupied ? '#94a3b8' : '#1e293b'};
                opacity: ${occupied ? 0.6 : 1};">
                ${already ? '✅ ' : occupied ? '' : '📅 '}${FULL_DAYS[di]} · ${meal}${occupied ? ` (${state.plan[d][meal].name.slice(0, 12)}…)` : ''}
              </button>
            `;
          }).join('')).join('')}
        </div>

        <button class="btn btn-green" style="margin-top: 12px;" onclick="addRecipeToShopping(${r.id})">
          🛒 Přidat do nákupu
        </button>
      `;
      
      document.getElementById('modalContent').innerHTML = modalContent;
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    function addToPlan(recipeId, day, meal) {
      const r = RECIPES.find(recipe => recipe.id === recipeId);
      state.plan[day][meal] = r;
      saveState();
      updateStats();
      closeModal();
      switchTab('plan');
      showToast(`Přidáno: ${FULL_DAYS[DAYS.indexOf(day)]} · ${meal} ✅`);
    }

    function addRecipeToShopping(recipeId) {
      const r = RECIPES.find(recipe => recipe.id === recipeId);
      const toAdd = r.ingredients
        .filter(ing => !state.shopping.find(s => s.name === ing))
        .map(ing => ({ name: ing, checked: false, id: Date.now() + Math.random() }));
      
      state.shopping = [...state.shopping, ...toAdd];
      saveState();
      closeModal();
      showToast(`Přidáno ${toAdd.length} položek do nákupu 🛒`);
    }

    // Event listeners
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.getElementById('modal').addEventListener('click', closeModal);
    document.getElementById('generateBtn').addEventListener('click', generateShopping);
    document.getElementById('generateBtn2').addEventListener('click', generateShopping);
    document.getElementById('shareBtn').addEventListener('click', shareShoppingList);
    document.getElementById('addCustomBtn').addEventListener('click', addCustomShoppingItem);
    document.getElementById('customShopInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addCustomShoppingItem();
    });
    document.getElementById('fridgeSearchBtn').addEventListener('click', searchFridge);
    document.getElementById('fridgeInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') searchFridge();
    });

    // Init
    loadState();
    updateHeader();
    updateStats();
    switchTab('plan');
  </script>
</body>
</html>
